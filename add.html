<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lägg till erfarenhet</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="nav-links" href="./index.html">Hem</a></li>
                <li><a class="nav-links" id="current-page" href="add.html">Lägg till i CV</a></li>
                <li><a class="nav-links" href="about.html">Om uppgiften</a></li>
            </ul>
        </nav>
    </header>
    <main class="add-main">
        <h1>Lägg till ny arbetserfarenhet i ditt CV</h1>
        <form id="add-experience-form" method="post">
            <legend>Formulär för nytt jobb</legend>
            <div id="error-message"></div>
            <div>
                <label for="company">Arbetsgivare</label>
                <input type="text" id="company" name="company" placeholder="Skriv arbetsgivare">
            </div>

            <div>
                <label for="title">Din arbetstitel</label>
                <input type="text" id="title" name="title" placeholder="Skriv arbetstitel">
            </div>

            <div>
                <label for="location">Ort</label>
                <input type="text" id="location" name="location" placeholder="Skriv ort">
            </div>

            <div>
                <label for="description">Beskrivning</label>
                <textarea name="description" id="description" cols="33" rows="5" placeholder="Skriv beskrivning"></textarea>
            </div>

            <button id="add-work-btn" type="submit">Lägg till erfarenhet<span id="svg-icon" class="material-symbols-outlined">add_business
</span></button>
        </form>
    </main>
    <footer>
        <p>2026 Filip B | Lab2.2 - Backend-baserad Webbutveckling</p>
    </footer>
    <script type="module" src="/src/js/add.js"></script>
</body>

</html>
